server.port=0
spring.application.name=hb-oms-service

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false

eureka.client.service-url.defaultZone=http://${EUREKA_SERVER:localhost}:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.healthcheck.enabled=true

management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=4
spring.rabbitmq.listener.simple.retry.initial-interval=5000
spring.rabbitmq.listener.simple.retry.multiplier=1
spring.rabbitmq.listener.simple.retry.max-interval=300000

spring.datasource.url=jdbc:mysql://${OMS_MYSQL_HOST:localhost}:3306/${OMS_DB_NAME}?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.data.redis.host=${OMS_REDIS_HOST:localhost}
spring.data.redis.port=6379

spring.security.oauth2.client.registration.portfolio-client.client-id=hb-oms-service
spring.security.oauth2.client.registration.portfolio-client.client-secret=${OMS_SERVICE_SECRET}
spring.security.oauth2.client.registration.portfolio-client.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.portfolio-client.scope=openid
spring.security.oauth2.client.provider.portfolio-client.token-uri=http://${KEYCLOAK_SERVER:localhost}:8080/realms/home-broker/protocol/openid-connect/token

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://${KEYCLOAK_SERVER:localhost}:8080/realms/home-broker/protocol/openid-connect/certs
